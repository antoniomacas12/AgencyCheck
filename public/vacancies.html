<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Open Vacancies</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .vac{max-width:720px;margin:0 auto;padding:2rem 1.25rem 4rem}
    .v-head{margin-bottom:20px}
    .v-head h1{font-size:26px;font-weight:700;color:#e6edf3}
    .v-head p{font-size:13px;color:#8b949e;margin-top:4px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .stat{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:10px 12px;text-align:center}
    .stat-n{font-size:22px;font-weight:700;color:#22c55e}
    .stat-l{font-size:11px;color:#8b949e;margin-top:2px}
    .reqs{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;gap:14px;flex-wrap:wrap}
    .req{font-size:12px;font-weight:600}
    .search-wrap{position:relative;margin-bottom:12px}
    .search-wrap input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;padding:10px 14px 10px 40px;font-size:14px;outline:none}
    .search-wrap input:focus{border-color:#22c55e}
    .search-wrap input::placeholder{color:#8b949e}
    .s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#8b949e;font-size:16px;pointer-events:none}
    .tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px}
    .tabs::-webkit-scrollbar{display:none}
    .tab{background:#161b22;border:1px solid #30363d;border-radius:20px;color:#8b949e;font-size:12px;font-weight:500;padding:6px 14px;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
    .tab.active{background:#22c55e;border-color:#22c55e;color:#0d1117;font-weight:700}
    .filters{display:flex;gap:8px;margin-bottom:16px}
    .filters select{background:#161b22;border:1px solid #30363d;border-radius:7px;color:#e6edf3;font-size:12px;padding:7px 10px;flex:1;min-width:0;outline:none;cursor:pointer}
    .filters select:focus{border-color:#22c55e}
    .cat-sec{margin-bottom:8px}
    .cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid #21262d;margin-bottom:10px;cursor:pointer;user-select:none}
    .cat-title{font-size:12px;font-weight:700;color:#22c55e;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px}
    .cat-cnt{background:#1a2a1a;color:#22c55e;border-radius:10px;padding:1px 8px;font-size:10px}
    .chevron{color:#8b949e;font-size:13px;transition:transform .25s}
    .chevron.open{transform:rotate(180deg)}
    .jobs-list{display:flex;flex-direction:column;gap:8px;overflow:hidden;transition:max-height .3s ease}
    .job{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:12px 14px}
    .job-title{font-size:14px;font-weight:600;color:#e6edf3;margin-bottom:6px;line-height:1.35}
    .job-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
    .salary{background:#1a2a1a;color:#22c55e;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700}
    .salary.no-sal{background:#1c1c1c;color:#8b949e}
    .loc{color:#8b949e;font-size:12px}
    .badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
    .badge{border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px}
    .b-eng{background:#001122;color:#60a5fa}
    .b-car{background:#1a0d2e;color:#a78bfa}
    .b-acc{background:#0d2424;color:#34d399}
    .wa-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:#22c55e;color:#0d1117;border:none;border-radius:8px;font-size:13px;font-weight:700;padding:9px 14px;width:100%;cursor:pointer;text-decoration:none;transition:background .15s}
    .wa-btn:hover{background:#16a34a}
    .no-res{text-align:center;padding:50px 20px;color:#8b949e;font-size:14px}
    .result-count{font-size:12px;color:#8b949e;margin-bottom:12px}
    @media(max-width:480px){
      .vac{padding:1.25rem 1rem 3rem}
      .v-head h1{font-size:21px}
      .stats{gap:7px}
      .stat-n{font-size:18px}
    }
  </style>
</head>
<body>
<div class="vac">

  <div class="v-head">
    <h1>Current Open Vacancies</h1>
    <p>Netherlands &amp; Greece · Message only · +31613754893</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="pos-count">65</div><div class="stat-l">Positions</div></div>
    <div class="stat"><div class="stat-n">7</div><div class="stat-l">Categories</div></div>
    <div class="stat"><div class="stat-n">€450+</div><div class="stat-l">Per week</div></div>
  </div>

  <div class="reqs">
    <span class="req" style="color:#f59e0b">🇪🇺 EU citizens only</span>
    <span class="req" style="color:#60a5fa">🌐 English required</span>
    <span class="req" style="color:#86efac">⚡ Immediate start</span>
  </div>

  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" id="search" placeholder="Search jobs, locations…">
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="all">All</button>
    <button class="tab" data-cat="technical">Technical</button>
    <button class="tab" data-cat="production">Production</button>
    <button class="tab" data-cat="warehouse">Warehouse</button>
    <button class="tab" data-cat="driving">Driving</button>
    <button class="tab" data-cat="automotive">Automotive</button>
    <button class="tab" data-cat="food">Food</button>
    <button class="tab" data-cat="hospitality">Hospitality</button>
  </div>

  <div class="filters">
    <select id="f-sal">
      <option value="0">Any salary</option>
      <option value="400">€400+/wk</option>
      <option value="500">€500+/wk</option>
      <option value="600">€600+/wk</option>
      <option value="700">€700+/wk</option>
      <option value="800">€800+/wk</option>
    </select>
    <select id="f-badge">
      <option value="">All jobs</option>
      <option value="acc">Accommodation incl.</option>
      <option value="car">Own car needed</option>
      <option value="eng">Special language req.</option>
    </select>
  </div>

  <div class="result-count" id="res-count"></div>
  <div id="listings"></div>

</div>

<script>
const WA_NUM = "31613754893";

function waLink(title, loc) {
  const m = `Hi, I'm interested in the ${title} position in ${loc}. BSN: [YES/NO]. Accommodation needed: [YES/NO].`;
  return `https://wa.me/${WA_NUM}?text=${encodeURIComponent(m)}`;
}

const CAT_LABELS = {

  warehouse:   "Warehouse & Logistics",

  food:        "Food Production",
  hospitality: "Hospitality"
};

const JOBS = [
  // Technical & Construction
  {t:"Electrician",c:"technical",s:"€550–€650/wk",sm:550,l:"Bodegraven",b:[]},
  {t:"Construction Welder (MIG/MAG)",c:"technical",s:"€650/wk",sm:650,l:"Rotterdam area",b:[]},
  {t:"Elevator Fitter",c:"technical",s:"€700–€800/wk",sm:700,l:"Rotterdam area",b:[]},
  {t:"Pipe Fitter (Workshop / Prefab)",c:"technical",s:"€700/wk",sm:700,l:"Rotterdam area",b:[]},
  {t:"Copper Pipe Brazer / Solderer",c:"technical",s:"€650/wk",sm:650,l:"Bunschoten Spakenburg",b:[]},

  {t:"Ironworker (Shipbuilding)",c:"technical",s:"€560+/wk",sm:560,l:"Netherlands",b:[]},
  {t:"Mechanical Fitter (Yacht Construction)",c:"technical",s:"€600–€650/wk",sm:600,l:"Hellevoetsluis",b:[]},

  {t:"Dock Worker",c:"technical",s:"€590–€700/wk",sm:590,l:"Rotterdam area",b:[]},

  {t:"Train Electrician / Mechanic",c:"technical",s:"€580/wk",sm:580,l:"Roosendaal",b:[]},
  {t:"MIG/MAG Welder / Assembler (Black Steel)",c:"technical",s:"€640–€960/wk",sm:640,l:"Obdam",b:[]},
  {t:"MAG Welder / Assembler",c:"technical",s:"€640/wk",sm:640,l:"Akersloot",b:[]},
  {t:"Junior Construction Plumber",c:"technical",s:"€535–€575/wk",sm:535,l:"Rotterdam area",b:[]},
  {t:"Plumber",c:"technical",s:"€560–€660/wk",sm:560,l:"Amsterdam",b:[]},
  {t:"Tiler",c:"technical",s:"€560–€660/wk",sm:560,l:"Hardenberg",b:[]},
  {t:"Prefab Wood Construction Worker",c:"technical",s:"€490–€530/wk",sm:490,l:"Uden",b:[]},
  {t:"PVC Window Fitter",c:"technical",s:"€535/wk",sm:535,l:"Posterholt / Purmerend",b:["car"]},
  {t:"Aluminum Window Frame Assembler",c:"technical",s:"€510/wk",sm:510,l:"Beverwijk",b:[]},
  {t:"PVC Window Assembler (40h)",c:"technical",s:"€510/wk",sm:510,l:"Moergestel",b:[]},
  {t:"Aluminum Window Fitters",c:"technical",s:"€535–€560/wk",sm:535,l:"Netherlands",b:[]},
  {t:"Modular Houses Assembly (Carpentry)",c:"technical",s:"€520/wk",sm:520,l:"Hulst",b:["car"]},
  {t:"Work Planner / Project Coordinator (Petrochemical)",c:"technical",s:"€830+/wk",sm:830,l:"Antwerp",b:["eng"]},
  // Production & Manufacturing
  {t:"Car Frame Builder / Assembly Worker",c:"production",s:"€550–€650/wk",sm:550,l:"Waardenburg",b:[]},
  {t:"Automotive Electrician",c:"production",s:"€550–€650/wk",sm:550,l:"Netherlands",b:[]},
  {t:"Welding Robot Operator",c:"production",s:"€520–€650/wk",sm:520,l:"Netherlands",b:[]},
  {t:"CNC Milling Operator (2nd shift)",c:"production",s:"€630/wk",sm:630,l:"Oirschot",b:["car"]},
  {t:"CNC Operator / Programmer",c:"production",s:"€500+/wk",sm:500,l:"Netherlands",b:[]},
  {t:"TIG Welder",c:"production",s:"€500+/wk",sm:500,l:"Netherlands",b:[]},
  {t:"MIG/MAG Welder",c:"production",s:"€500+/wk",sm:500,l:"Netherlands",b:[]},
  {t:"CNC Turner (Mazak / Mazatrol)",c:"production",s:"€580–€650/wk",sm:580,l:"Breskens",b:[]},
  {t:"CNC Turners & Millers (Programmers)",c:"production",s:"€650/wk",sm:650,l:"Netherlands",b:[]},
  {t:"Workshop Carpenter",c:"production",s:"€620/wk",sm:620,l:"Netherlands",b:["car"]},
  {t:"Industrial Painter",c:"production",s:"€500/wk",sm:500,l:"Oisterwijk",b:[]},
  {t:"Assembly Mechanic",c:"production",s:"€450–€550/wk",sm:450,l:"Oisterwijk",b:[]},
  // Warehouse & Logistics
  {t:"Warehouse Worker",c:"warehouse",s:"—",sm:0,l:"Waalwijk",b:[]},
  {t:"Warehouse Employee (EPT, cold environment)",c:"warehouse",s:"—",sm:0,l:"Grubbenvorst",b:[]},
  {t:"Deepfreeze Warehouse Worker (Sligro)",c:"warehouse",s:"—",sm:0,l:"Veghel",b:[]},
  {t:"All-round Warehouse Employee",c:"warehouse",s:"—",sm:0,l:"Helmond / Deurne / Eindhoven",b:[]},
  // Driving Jobs
  {t:"CE Truck Driver (Hook arm)",c:"driving",s:"€1000–€1200/wk",sm:1000,l:"Eindhoven",b:[]},
  {t:"CE Truck Driver – Car Transportation",c:"driving",s:"€800–€1000/wk",sm:800,l:"Vianen",b:[]},
  {t:"CE Truck Driver (Lidl, 40-55h)",c:"driving",s:"€675–€875/wk",sm:675,l:"Netherlands",b:[]},
  {t:"C cat. Truck Driver – Distribution & Logistics",c:"driving",s:"€700–€1000/wk",sm:700,l:"Netherlands",b:["car"]},
  {t:"CE Truck Driver – Distribution & Logistics",c:"driving",s:"€700–€1000/wk",sm:700,l:"Netherlands",b:["car"]},
  {t:"Damage Repairer (Trailers)",c:"driving",s:"€580+/wk",sm:580,l:"Hoorn",b:[]},
  {t:"Truck Mechanic",c:"driving",s:"€600–€700/wk",sm:600,l:"Alblasserdam",b:[]},
  {t:"Industrial Painter (Trailers & Trucks)",c:"driving",s:"€600/wk",sm:600,l:"Venlo",b:[]},
  {t:"Bus Driver (Public Transport)",c:"driving",s:"€550–€620/wk",sm:550,l:"Netherlands",b:[]},
  {t:"Bus Driver – Free Accommodation",c:"driving",s:"€600–€800/wk",sm:600,l:"Netherlands",b:["acc"]},
  {t:"Tractor Driver (Green Sector)",c:"driving",s:"€450–€550/wk",sm:450,l:"Numansdorp",b:[]},
  // Automotive
  {t:"MIG/MAG Welder – Fitter (Truck Trailers)",c:"automotive",s:"€600–€750/wk",sm:600,l:"Netherlands",b:[]},
  {t:"Car Mechanic (min. 5 years exp.)",c:"automotive",s:"€580–€640/wk",sm:580,l:"Netherlands",b:[]},
  {t:"Car Pre-Processor",c:"automotive",s:"€560–€600/wk",sm:560,l:"Horst",b:[]},
  {t:"Car Painter",c:"automotive",s:"€600–€750/wk",sm:600,l:"Netherlands",b:[]},
  {t:"Car Mechanic",c:"automotive",s:"€550+/wk",sm:550,l:"Netherlands",b:[]},
  // Food Production
  {t:"Meat Factory Production Worker & Cleaner",c:"food",s:"—",sm:0,l:"Haarlem",b:[]},
  {t:"Wooden Packaging Production Worker",c:"food",s:"€400–€500/wk",sm:400,l:"Nieuw-Bergen",b:[]},
  {t:"Poultry Hanger",c:"food",s:"€320–€370/wk",sm:320,l:"Goor",b:[]},
  // Hospitality
  {t:"Housekeeper (1-2 yrs exp.)",c:"hospitality",s:"—",sm:0,l:"Amsterdam / Utrecht / Tilburg",b:[]},
  {t:"Cook (with experience)",c:"hospitality",s:"—",sm:0,l:"Netherlands",b:[]},
  {t:"Assistant Cook",c:"hospitality",s:"—",sm:0,l:"Rhodes, Crete, Kos",b:["acc"]},
  {t:"Dishwasher",c:"hospitality",s:"—",sm:0,l:"Rhodes, Crete, Kos",b:["acc"]},
  {t:"Experienced Cook",c:"hospitality",s:"—",sm:0,l:"Rhodes, Crete, Kos",b:["acc"]},
  {t:"Experienced Bartender",c:"hospitality",s:"—",sm:0,l:"Rhodes, Crete, Kos",b:["acc"]},
  {t:"Experienced Housekeeper",c:"hospitality",s:"€900/mo net",sm:900,l:"Rhodes, Crete, Kos",b:["acc"]},
  {t:"Experienced Waiter / Waitress",c:"hospitality",s:"—",sm:0,l:"Rhodes, Crete, Kos",b:["acc"]},
  {t:"Receptionist (German & English req.)",c:"hospitality",s:"—",sm:0,l:"Rhodes, Crete, Kos",b:["acc","eng"]},
];

const BADGE_META = {
  eng:{cls:"b-eng",label:"Special language req."},
  car:{cls:"b-car",label:"Own car required"},
  acc:{cls:"b-acc",label:"Accommodation incl."},
};

let activeCat="all", activeSearch="", activeSal=0, activeBadge="";
const collapsed={};

function render(){
  const q=activeSearch.toLowerCase();
  const filtered=JOBS.filter(j=>{
    if(activeCat!=="all"&&j.c!==activeCat)return false;
    if(activeSal>0&&j.sm<activeSal)return false;
    if(activeBadge&&!j.b.includes(activeBadge))return false;
    if(q&&!j.t.toLowerCase().includes(q)&&!j.l.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById("pos-count").textContent=filtered.length;
  document.getElementById("res-count").textContent=filtered.length===JOBS.length
    ?"":filtered.length+" result"+(filtered.length!==1?"s":"")+" found";
  const byCat={};
  filtered.forEach(j=>{(byCat[j.c]=byCat[j.c]||[]).push(j);});
  const cats=activeCat==="all"?Object.keys(CAT_LABELS):[activeCat];
  const html=cats.map(cat=>{
    const jobs=byCat[cat];
    if(!jobs||!jobs.length)return"";
    const open=collapsed[cat]!==true;
    return`<div class="cat-sec">
      <div class="cat-hdr" onclick="toggleCat('${cat}')">
        <span class="cat-title">${CAT_LABELS[cat]}<span class="cat-cnt">${jobs.length}</span></span>
        <span class="chevron${open?" open":""}">▼</span>
      </div>
      <div class="jobs-list" id="jl-${cat}" style="max-height:${open?"9999px":"0"}">
        ${jobs.map(j=>jobCard(j)).join("")}
      </div>
    </div>`;
  }).join("");
  document.getElementById("listings").innerHTML=html||`<div class="no-res">No vacancies match your filters.</div>`;
}

function jobCard(j){
  const badges=j.b.map(b=>BADGE_META[b]?`<span class="badge ${BADGE_META[b].cls}">${BADGE_META[b].label}</span>`:"").join("");
  const salCls=j.s==="—"?"salary no-sal":"salary";
  return`<div class="job">
    <div class="job-title">${j.t}</div>
    <div class="job-meta">
      <span class="${salCls}">${j.s}</span>
      <span class="loc">📍 ${j.l}</span>
    </div>
    ${badges?`<div class="badges">${badges}</div>`:""}
    <a class="wa-btn" href="${waLink(j.t,j.l)}" target="_blank" rel="noopener noreferrer">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Apply on WhatsApp
    </a>
  </div>`;
}

function toggleCat(cat){
  collapsed[cat]=collapsed[cat]!==true;
  const el=document.getElementById("jl-"+cat);
  const chev=el.previousElementSibling.querySelector(".chevron");
  if(collapsed[cat]){el.style.maxHeight="0";chev.classList.remove("open");}
  else{el.style.maxHeight="9999px";chev.classList.add("open");}
}

document.getElementById("search").addEventListener("input",e=>{activeSearch=e.target.value;render();});
document.getElementById("f-sal").addEventListener("change",e=>{activeSal=parseInt(e.target.value)||0;render();});
document.getElementById("f-badge").addEventListener("change",e=>{activeBadge=e.target.value;render();});
document.getElementById("tabs").addEventListener("click",e=>{
  const btn=e.target.closest(".tab");
  if(!btn)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  activeCat=btn.dataset.cat;
  render();
});

render();
</script>
</body>
</html>
